<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Reserva de Passagens</title>
</head>
<body>
    <h1>Portal de Viagens</h1>
    <form id="travelForm">
        <label>Origem:</label>
        <input type="text" id="origem" required><br>
        
        <label>Destino:</label>
        <input type="text" id="destino" required><br>
        
        <label>Data de Ida:</label>
        <input type="date" id="dataIda" required><br>
        
        <label>Data de Volta:</label>
        <input type="date" id="dataVolta" required><br>
        
        <button type="submit">Buscar Passagens</button>
    </form>
    <div id="mensagem"></div>

    <script src="script.js"></script>
</body>
</html>
